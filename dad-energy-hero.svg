<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Dad Energy Meter hero art</title>
  <desc id="desc">A minimal energy gauge with calm orange and blue accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbf9"/>
      <stop offset="100%" stop-color="#eef4f1"/>
    </linearGradient>
    <linearGradient id="meter" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3f83f8"/>
      <stop offset="100%" stop-color="#ef7d23"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="520" rx="40" fill="url(#bg)"/>

  <g transform="translate(120 86)">
    <text x="0" y="38" font-family="Avenir Next, Avenir, sans-serif" font-size="26" font-weight="700" fill="#294039">Dad Energy Meter</text>
    <text x="0" y="78" font-family="Avenir Next, Avenir, sans-serif" font-size="18" fill="#6a7d77">Simple daily signal for energy, sleep, and momentum.</text>
  </g>

  <g transform="translate(210 124)">
    <path d="M170 220 A220 220 0 0 1 610 220" fill="none" stroke="#dfe9e4" stroke-width="30" stroke-linecap="round"/>
    <path d="M170 220 A220 220 0 0 1 610 220" fill="none" stroke="url(#meter)" stroke-width="30" stroke-linecap="round" stroke-dasharray="390 300"/>
    <circle cx="390" cy="220" r="14" fill="#294039"/>
    <path d="M390 220 L536 124" stroke="#294039" stroke-width="12" stroke-linecap="round"/>

    <text x="390" y="176" text-anchor="middle" font-family="Avenir Next, Avenir, sans-serif" font-size="72" font-weight="700" fill="#ef7d23">7</text>
    <text x="390" y="208" text-anchor="middle" font-family="Avenir Next, Avenir, sans-serif" font-size="18" fill="#6a7d77">today's read</text>

    <circle cx="122" cy="220" r="10" fill="#3f83f8"/>
    <circle cx="658" cy="220" r="10" fill="#ef7d23"/>
    <text x="122" y="254" text-anchor="middle" font-family="Avenir Next, Avenir, sans-serif" font-size="16" fill="#6a7d77">rested</text>
    <text x="658" y="254" text-anchor="middle" font-family="Avenir Next, Avenir, sans-serif" font-size="16" fill="#6a7d77">charged</text>
  </g>

  <g transform="translate(860 154)">
    <rect width="168" height="168" rx="32" fill="#ffffff" stroke="#dfe9e4"/>
    <path d="M52 104 h64" stroke="#dfe9e4" stroke-width="10" stroke-linecap="round"/>
    <path d="M52 76 h48" stroke="#3f83f8" stroke-width="12" stroke-linecap="round"/>
    <path d="M52 104 h78" stroke="#ef7d23" stroke-width="12" stroke-linecap="round"/>
    <path d="M52 132 h58" stroke="#294039" stroke-width="12" stroke-linecap="round" opacity="0.22"/>
    <circle cx="122" cy="76" r="10" fill="#3f83f8"/>
    <circle cx="146" cy="104" r="10" fill="#ef7d23"/>
    <text x="84" y="46" text-anchor="middle" font-family="Avenir Next, Avenir, sans-serif" font-size="17" fill="#6a7d77">daily log</text>
  </g>
</svg>
